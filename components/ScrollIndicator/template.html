<div class="container">
    <div class="line-container" ref="lineContainer">
        <div class="line" ref="line"></div>
        <!-- <span v-for="item in 3" class="subline" ref="subline"></span> -->
        <span
            v-for="(item, i) in 3"
            :key="i"
            class="subline"
            :ref="el => sublines[i] = el"
            ></span>

    </div>
    <button class="button button-label" ref="label" @click="clickHandler">{{ label }}</button>
</div>

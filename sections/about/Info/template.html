<!-- Section -->
<section class="section">
    <div class="section__content">
      <div class="row row-title">
        <div class="column">
          <!-- Heading -->
          <Heading
            tag="h1"
            class="heading"
            :data="data?.title || headingText"
            :preserveLineBreak="true"
            isCustomTriggered="true"
            ref="heading"
          />
        
        <Body
          ref="body"
          :data="data?.description || bodyText"
          large="true"
          :trigger-on-scroll="false"
        />
        </div>
      </div>
    </div>
  </section>

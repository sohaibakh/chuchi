<!-- Section -->
<section class="section">
    <div class="section__content">
      <div class="row row-title">
        <div class="column">
  
          <!-- Heading -->
          <Heading
            tag="h1"
            ref="heading"
            isCustomTriggered="true"
            class="heading"
            :data="headingText" 
          />
  
          <!-- Industries grid -->
          <div class="industries-container">
            <div class="industries-grid">
              <div
                v-for="(industry, i) in localizedIndustries"
                :key="i"
                class="industry-box"
                @mouseenter="hoveredIndex = i"
                @mouseleave="hoveredIndex = null"
              >
                <img :src="industry.image" alt="" class="industry-bg" />
                <span class="industry-name">{{ industry.name }}</span> <!-- now localized -->
              </div>
            </div>
          </div>
  
        </div>
      </div>
    </div>
  </section>

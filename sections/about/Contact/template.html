<!-- Section -->
<section class="section">
    <div class="section__content">
      <div class="row">
        <div class="column">
          <!-- Heading -->
          <Heading
            tag="h2"
            :data="data?.title"  
            :preserveLineBreak="false"
            isCustomTriggered="true"
            ref="heading"
            />
  
          <!-- CTA -->
          <ButtonArrow ref="button" class="button" to="/contact" color="yellow">
            {{ data.action_label }}
          </ButtonArrow>
        </div>
      </div>
    </div>
  </section>

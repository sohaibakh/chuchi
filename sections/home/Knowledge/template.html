<!-- Section -->
<section class="section"
  :class="{ ar: isArabic }"
  :dir="isArabic ? 'rtl' : 'ltr'">

  <!-- Section content -->
  <div class="section__content">

    <!-- Row title -->
    <div class="row row-title">
      <div class="column">
        <Heading
          tag="h2"
          ref="heading"
          isCustomTriggered="false"
          class="heading-b heading"
          :preserve-line-break="true"
          :data="t.title"
        />
      </div>
    </div>

    <!-- Row body -->
    <div class="row row-body">
      <div class="column">
        <Body
          ref="body"
          class="body"
          :data="t.description"
          :trigger-on-scroll="false"
        />
        <!-- CTA (keep commented if not needed) -->
        <!-- <ButtonUnderlined v-bind:link="t.ctaLink" ref="cta">{{ t.ctaLabel }}</ButtonUnderlined> -->
      </div>
    </div>

  </div>
</section>

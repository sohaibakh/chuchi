<section class="section"
  :class="{ ar: isArabic }"
  :dir="isArabic ? 'rtl' : 'ltr'">

  <!-- Section content -->
  <div class="section__content">

    <!-- Row title -->
    <div class="row row-title">
      <div class="column">
          <Heading
            tag="h2"
            class="knowledge-heading"
            :data="data.title"
            ref="heading"
            :isCustomTriggered="true"
            :preserve-line-break="true"
          />
      </div>
    </div>

    <!-- Row body -->
    <div class="row row-body">
      <div class="column">
        <Body
          ref="body"
          class="body"
          :data="data.description"
          :trigger-on-scroll="false"
        />
        <!-- CTA (keep commented if not needed) -->
        <!-- <ButtonUnderlined v-bind:link="t.ctaLink" ref="cta">{{ t.ctaLabel }}</ButtonUnderlined> -->
      </div>
    </div>

  </div>
</section>

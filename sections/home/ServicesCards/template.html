<section class="section">
    <div class="section__content">
        <div class="row row-title">
            <div class="column">

                <!-- Heading -->
                <!-- <Heading tag="h2" ref="heading" isCustomTriggered="false" class="heading-b heading" :data="data.title" :preserve-line-break="true" /> -->
                <Heading
                  ref="heading"
                  tag="h2"
                  :data="headingText"  
                  class="heading-b heading center-heading"
                  :isCustomTriggered="true"
                  :preserve-line-break="true"
                />

      
            </div>
        </div>

        <div class="row-cards">
          <nuxt-link
            v-for="(slide, index) in localizedSlides"
            :key="index"
            :to="localePath({ name: 'services-slug', params: { slug: slide.slug } })"
            class="card"
          >
            <div class="card-inner" ref="sercards" refInFor>
              <img :src="slide.image?.sizes?.['1920x0']?.url || slide.image?.url" :alt="slide.title" />

              <p class="card-title">{{ slide.title }}</p> 
            </div>
          </nuxt-link>
        </div>
        
    </div>
</section>

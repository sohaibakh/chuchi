<section class="section" :class="{ ar: direction === -1 }">
  <div class="section__content">
    <div class="content">
      <div class="row">
        <ul class="list" ref="list">
          <li
            v-for="(item, index) in slides"
            :key="item.slug"
            class="list-item"
            ref="item"
            :data-index="index"
            :data-link="`services/${item.slug}`"
            @click="projectClickHandler"
          >
            <div
              class="hover-container"
              @mouseenter="mouseenterHandler"
              @mouseleave="mouseleaveHandler"
              :data-index="index"
              ref="hoverContainer"
            >
              <nuxt-link
                  v-bind:to="`services/${item.slug}`"
                  v-bind:class="allowHover ? 'is-hover-allowed' : ''"
                  ref="title"
              >
                {{ item.title }}
              </nuxt-link>
            </div>
          </li>
        </ul>

        <!-- Arrows (CSS swaps sides in RTL via .section.ar) -->
        <button ref="buttonLeft"  class="button-arrow button-arrow--left"  type="button" aria-label="Previous" @click="clickPreviousHandler">
          <Arrow class="arrow" />
        </button>
        
        <button ref="buttonRight" class="button-arrow button-arrow--right" type="button" aria-label="Next"     @click="clickNextHandler">
          <Arrow class="arrow" />
        </button>
        

      </div>
    </div>
  </div>
</section>
